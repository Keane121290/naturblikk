name: Naturblikk kvalitetsbatch 07

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  oppdater-artsfil:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Oppdater og valider batch 7
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          from copy import deepcopy
          from pathlib import Path

          csv_path = Path('arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv')
          status_path = Path('arter/kvalitetskontroll-status.md')
          payload_paths = [
              Path('arter/kvalitetsbatch-07-del-1.json'),
              Path('arter/kvalitetsbatch-07-del-2.json'),
              Path('arter/kvalitetsbatch-07-del-3.json'),
          ]

          expected_slugs = [
              'lappiplerke',
              'lappmeis',
              'lappsanger',
              'lappspove',
              'lappspurv',
              'lappugle',
              'lavskrike',
              'lerkefalk',
              'linerle',
              'lirype',
              'lomvi',
              'lunde',
              'lovsanger',
              'laavesvale',
              'makrellterne',
          ]

          updates = []
          for payload_path in payload_paths:
              payload = json.loads(payload_path.read_text(encoding='utf-8'))
              updates.extend(payload['updates'])

          expected_headers = [
              'post_title', 'post_name', 'post_status', 'artsgruppe',
              'vitenskapelig_navn', 'engelsk_navn', 'kort_beskrivelse',
              'lang_beskrivelse', 'storrelse', 'vekt', 'kjennetegn',
              'levested', 'utbredelse', 'sesong_aktiv_periode',
              'mat_naering', 'rodlistestatus', 'status_i_norge',
              'artsdatabanken_takson_id', 'kilde_artsdatabanken',
              'kilde_snl', 'kilde_fuglevennen_miljolaere',
              'kilde_birdlife_fugleatlas', 'sist_kontrollert', 'importstatus'
          ]

          if len(expected_slugs) != 15 or len(set(expected_slugs)) != 15:
              raise SystemExit('Batch 7 mÃ¥ inneholde nÃ¸yaktig 15 unike slugs')
          if len(updates) != 15:
              raise SystemExit(f'Forventet 15 oppdateringer, fant {len(updates)}')

          with csv_path.open(encoding='utf-8-sig', newline='') as f:
              reader = csv.DictReader(f)
              headers = reader.fieldnames
              rows = list(reader)

          if headers != expected_headers:
              raise SystemExit('CSV-header avviker fra forventet 24-kolonners struktur')
          if len(rows) != 238:
              raise SystemExit(f'Forventet 238 arter, fant {len(rows)}')
          if len({row['post_name'] for row in rows}) != 238:
              raise SystemExit('CSV inneholder dupliserte slugs')

          original_rows = deepcopy(rows)
          update_map = {item['post_name']: item for item in updates}
          target_set = set(expected_slugs)
          if len(update_map) != 15 or set(update_map) != target_set:
              raise SystemExit('Payloadene samsvarer ikke med de 15 forventede artene')

          protected = {
              'post_title', 'post_name', 'post_status', 'artsgruppe',
              'vitenskapelig_navn', 'engelsk_navn', 'artsdatabanken_takson_id',
              'kilde_artsdatabanken', 'kilde_snl',
              'kilde_fuglevennen_miljolaere', 'kilde_birdlife_fugleatlas'
          }
          allowed = set(headers) - protected
          found = set()

          for row in rows:
              slug = row['post_name']
              if slug not in update_map:
                  continue
              patch = update_map[slug]
              unknown = set(patch) - (allowed | {'post_name'})
              if unknown:
                  raise SystemExit(f'Ugyldige felter for {slug}: {sorted(unknown)}')
              for field, value in patch.items():
                  if field != 'post_name':
                      row[field] = value
              found.add(slug)

          if found != target_set:
              raise SystemExit(f'Mangler mÃ¥larter: {sorted(target_set - found)}')

          changed = {
              before['post_name']
              for before, after in zip(original_rows, rows)
              if before != after
          }
          if changed != target_set:
              raise SystemExit(f'Feil sett med endrede arter: {sorted(changed)}')

          for row in rows:
              if row['post_name'] not in target_set:
                  continue
              slug = row['post_name']
              if row['sist_kontrollert'] != '2026-07-16':
                  raise SystemExit(f'Feil kontrolldato for {slug}')
              if row['importstatus'] != 'Fullstendig kvalitetssikret â€“ batch 7 og sprÃ¥kvasket 2026-07-16':
                  raise SystemExit(f'Ugyldig importstatus for {slug}')
              if row['lang_beskrivelse'].count('<h2>') < 7:
                  raise SystemExit(f'Mangler strukturert langtekst for {slug}')
              if 'Status og bruk i Naturblikk' in row['lang_beskrivelse']:
                  raise SystemExit(f'Generisk fylltekst finnes fortsatt for {slug}')
              if 'Mat og adferd' in row['lang_beskrivelse']:
                  raise SystemExit(f'Gammel sprÃ¥kform finnes fortsatt for {slug}')

          out = io.StringIO()
          writer = csv.DictWriter(
              out,
              fieldnames=headers,
              quoting=csv.QUOTE_ALL,
              lineterminator='\n'
          )
          writer.writeheader()
          writer.writerows(rows)
          csv_path.write_text(out.getvalue(), encoding='utf-8')

          status = status_path.read_text(encoding='utf-8')
          if 'Fullstendig kvalitetssikret: **81**' not in status:
              raise SystemExit('Statusfilen har ikke forventet startverdi 81')
          if 'GjenstÃ¥r: **157**' not in status:
              raise SystemExit('Statusfilen har ikke forventet startverdi 157')

          status = status.replace(
              'Fullstendig kvalitetssikret: **81**',
              'Fullstendig kvalitetssikret: **96**',
              1,
          )
          status = status.replace(
              'GjenstÃ¥r: **157**',
              'GjenstÃ¥r: **142**',
              1,
          )

          batch_lines = [
              '### Batch 7 â€“ nordlige arter, sjÃ¸fugler og trekkfugler',
              '',
              '- Lappiplerke (`lappiplerke`)',
              '- Lappmeis (`lappmeis`)',
              '- Lappsanger (`lappsanger`)',
              '- Lappspove (`lappspove`)',
              '- Lappspurv (`lappspurv`)',
              '- Lappugle (`lappugle`)',
              '- Lavskrike (`lavskrike`)',
              '- Lerkefalk (`lerkefalk`)',
              '- Linerle (`linerle`)',
              '- Lirype (`lirype`)',
              '- Lomvi (`lomvi`)',
              '- Lunde (`lunde`)',
              '- LÃ¸vsanger (`lovsanger`)',
              '- LÃ¥vesvale (`laavesvale`)',
              '- Makrellterne (`makrellterne`)',
              '',
              '',
          ]
          batch_section = '\n'.join(batch_lines)
          marker = '## GjenstÃ¥r\n'
          if batch_section not in status:
              if marker not in status:
                  raise SystemExit('Fant ikke innsettingspunkt i statusfilen')
              status = status.replace(marker, batch_section + marker, 1)

          if 'Fullstendig kvalitetssikret: **96**' not in status:
              raise SystemExit('Statusfilen fikk feil antall ferdige arter')
          if 'GjenstÃ¥r: **142**' not in status:
              raise SystemExit('Statusfilen fikk feil antall gjenstÃ¥ende arter')
          status_path.write_text(status, encoding='utf-8')

          for path in (
              Path('.github/workflows/naturblikk-kvalitetsbatch-07.yml'),
              *payload_paths,
          ):
              if path.exists():
                  path.unlink()
          PY

      - name: Lagre batch 7
        run: |
          git config user.name 'Naturblikk kvalitetskontroll'
          git config user.email 'post@naturblikk.no'
          git add -A
          git commit -m 'Kvalitetssikre batch 7: 15 nordlige arter, sjÃ¸fugler og trekkfugler'
          git push origin main
