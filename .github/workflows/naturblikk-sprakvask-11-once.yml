name: Naturblikk språkvask 11 arter

on:
  push:
    paths:
      - '.github/workflows/naturblikk-sprakvask-11-once.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Språkvask og valider CSV
        env:
          PAYLOAD_B64: '' 
        run: |
          python - <<'PY'
          import base64
          import csv
          import hashlib
          import io
          import json
          import os
          import zlib
          from pathlib import Path

          csv_path = Path('arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv')
          workflow_path = Path('.github/workflows/naturblikk-sprakvask-11-once.yml')

          raw = csv_path.read_bytes()
          current_blob_sha = hashlib.sha1(
              f"blob {len(raw)}\0".encode('utf-8') + raw
          ).hexdigest()

          payload = json.loads(
              zlib.decompress(base64.b64decode(os.environ['PAYLOAD_B64'])).decode('utf-8')
          )

          if current_blob_sha != payload['expected_blob_sha']:
              raise SystemExit(
                  f"CSV-filen er endret siden språkvasken ble laget. "
                  f"Forventet {payload['expected_blob_sha']}, fant {current_blob_sha}."
              )

          text = raw.decode('utf-8-sig')
          reader = csv.DictReader(io.StringIO(text))
          headers = reader.fieldnames
          rows = list(reader)

          expected_headers = [
              'post_title','post_name','post_status','artsgruppe',
              'vitenskapelig_navn','engelsk_navn','kort_beskrivelse',
              'lang_beskrivelse','storrelse','vekt','kjennetegn','levested',
              'utbredelse','sesong_aktiv_periode','mat_naering',
              'rodlistestatus','status_i_norge','artsdatabanken_takson_id',
              'kilde_artsdatabanken','kilde_snl',
              'kilde_fuglevennen_miljolaere','kilde_birdlife_fugleatlas',
              'sist_kontrollert','importstatus'
          ]

          if headers != expected_headers:
              raise SystemExit('CSV-headeren er ikke den forventede 24-kolonners headeren.')

          if len(rows) != 238:
              raise SystemExit(f'Forventet 238 arter, fant {len(rows)}.')

          slugs = [row['post_name'] for row in rows]
          if len(set(slugs)) != 238:
              raise SystemExit('CSV-filen inneholder dupliserte slugs.')

          updates = payload['updates']
          found = set()

          for row in rows:
              slug = row['post_name']
              if slug not in updates:
                  continue

              found.add(slug)
              for field, value in updates[slug].items():
                  if field not in headers:
                      raise SystemExit(f'Ukjent felt {field} for {slug}.')
                  row[field] = value

              row['sist_kontrollert'] = payload['sist_kontrollert']
              row['importstatus'] = payload['importstatus']

          missing = sorted(set(updates) - found)
          if missing:
              raise SystemExit('Fant ikke disse artene: ' + ', '.join(missing))

          if len(found) != 11:
              raise SystemExit(f'Forventet å oppdatere 11 arter, oppdaterte {len(found)}.')

          out = io.StringIO()
          writer = csv.DictWriter(
              out,
              fieldnames=headers,
              quoting=csv.QUOTE_ALL,
              lineterminator='\n'
          )
          writer.writeheader()
          writer.writerows(rows)
          csv_path.write_text(out.getvalue(), encoding='utf-8')

          # Kontroller resultatet en gang til.
          with csv_path.open(encoding='utf-8', newline='') as handle:
              check_reader = csv.DictReader(handle)
              check_rows = list(check_reader)

          if check_reader.fieldnames != expected_headers:
              raise SystemExit('Headeren ble endret under skriving.')
          if len(check_rows) != 238:
              raise SystemExit('Antall arter ble endret under skriving.')
          if len({r['post_name'] for r in check_rows}) != 238:
              raise SystemExit('Dupliserte slugs etter skriving.')

          for slug in updates:
              row = next(r for r in check_rows if r['post_name'] == slug)
              if row['importstatus'] != payload['importstatus']:
                  raise SystemExit(f'Importstatus ble ikke oppdatert for {slug}.')

          workflow_path.unlink()
          print('Språkvask fullført og validert for 11 arter.')
          PY

      - name: Lagre oppdateringen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv
          git add .github/workflows/naturblikk-sprakvask-11-once.yml
          git commit -m "Språkvask de 11 kvalitetssikrede artene"
          git push origin main
