name: Naturblikk kvalitetsbatch 17

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fullfor-kvalitetskontroll:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Oppdater og sluttvalider alle 238 arter
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          from copy import deepcopy
          from pathlib import Path

          csv_path = Path('arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv')
          status_path = Path('arter/kvalitetskontroll-status.md')
          payload_paths = [
              Path('arter/kvalitetsbatch-17-del-1.json'),
              Path('arter/kvalitetsbatch-17-del-2.json'),
          ]

          expected_slugs = [
              'gresshoppesanger', 'svartstrupe', 'topplerke', 'toppskarv',
              'tornirisk', 'aerfugl', 'aakerrikse',
          ]
          expected_headers = [
              'post_title', 'post_name', 'post_status', 'artsgruppe',
              'vitenskapelig_navn', 'engelsk_navn', 'kort_beskrivelse',
              'lang_beskrivelse', 'storrelse', 'vekt', 'kjennetegn',
              'levested', 'utbredelse', 'sesong_aktiv_periode',
              'mat_naering', 'rodlistestatus', 'status_i_norge',
              'artsdatabanken_takson_id', 'kilde_artsdatabanken',
              'kilde_snl', 'kilde_fuglevennen_miljolaere',
              'kilde_birdlife_fugleatlas', 'sist_kontrollert', 'importstatus',
          ]

          updates = []
          for path in payload_paths:
              updates.extend(json.loads(path.read_text(encoding='utf-8')))

          if len(expected_slugs) != 7 or len(set(expected_slugs)) != 7:
              raise SystemExit('Batch 17 mĂĄ inneholde nĂ¸yaktig sju unike slugs')
          if len(updates) != 7:
              raise SystemExit(f'Forventet sju oppdateringer, fant {len(updates)}')

          with csv_path.open(encoding='utf-8-sig', newline='') as handle:
              reader = csv.DictReader(handle)
              headers = reader.fieldnames
              rows = list(reader)

          if headers != expected_headers:
              raise SystemExit('CSV-header avviker fra forventet 24-kolonners struktur')
          if len(rows) != 238:
              raise SystemExit(f'Forventet 238 arter, fant {len(rows)}')
          if len({row['post_name'] for row in rows}) != 238:
              raise SystemExit('CSV inneholder dupliserte slugs')

          original_rows = deepcopy(rows)
          update_map = {item['post_name']: item for item in updates}
          target_set = set(expected_slugs)
          if len(update_map) != 7 or set(update_map) != target_set:
              raise SystemExit('Payload og forventede slugs samsvarer ikke')

          protected = {
              'post_title', 'post_name', 'post_status', 'artsgruppe',
              'vitenskapelig_navn', 'engelsk_navn',
              'artsdatabanken_takson_id', 'kilde_artsdatabanken',
              'kilde_snl', 'kilde_fuglevennen_miljolaere',
              'kilde_birdlife_fugleatlas',
          }
          allowed = set(headers) - protected
          found = set()

          for row in rows:
              slug = row['post_name']
              if slug not in update_map:
                  continue
              patch = update_map[slug]
              unknown = set(patch) - (allowed | {'post_name'})
              if unknown:
                  raise SystemExit(f'Ugyldige felter for {slug}: {sorted(unknown)}')
              for field, value in patch.items():
                  if field != 'post_name':
                      if isinstance(value, str):
                          value = value.replace('\u00ad', '')
                      row[field] = value
              found.add(slug)

          if found != target_set:
              raise SystemExit(f'Mangler mĂĄlart: {sorted(target_set - found)}')

          changed = {
              before['post_name']
              for before, after in zip(original_rows, rows)
              if before != after
          }
          if changed != target_set:
              raise SystemExit(f'Feil sett med endrede arter: {sorted(changed)}')

          expected_importstatus = (
              'Fullstendig kvalitetssikret â€“ batch 17 og sprĂĄkvasket 2026-07-16'
          )
          required_fields = [
              'kort_beskrivelse', 'storrelse', 'vekt', 'kjennetegn',
              'levested', 'utbredelse', 'sesong_aktiv_periode',
              'mat_naering', 'rodlistestatus', 'status_i_norge',
          ]

          for row in rows:
              slug = row['post_name']
              if slug in target_set:
                  if row['sist_kontrollert'] != '2026-07-16':
                      raise SystemExit(f'Feil kontrolldato for {slug}')
                  if row['importstatus'] != expected_importstatus:
                      raise SystemExit(f'Ugyldig importstatus for {slug}')

              if not row['importstatus'].startswith('Fullstendig kvalitetssikret'):
                  raise SystemExit(f'Arten er ikke fullstendig kvalitetssikret: {slug}')
              if row['lang_beskrivelse'].count('<h2>') < 7:
                  raise SystemExit(f'Mangler strukturert langtekst for {slug}')
              if 'Status og bruk i Naturblikk' in row['lang_beskrivelse']:
                  raise SystemExit(f'Generisk fylltekst finnes fortsatt for {slug}')
              if 'Mat og adferd' in row['lang_beskrivelse']:
                  raise SystemExit(f'Gammel sprĂĄkform finnes fortsatt for {slug}')
              if '\u00ad' in row['lang_beskrivelse']:
                  raise SystemExit(f'Skjult bindestrek finnes fortsatt for {slug}')
              for field in required_fields:
                  if not row[field].strip():
                      raise SystemExit(f'Tomt obligatorisk felt {field} for {slug}')

          output = io.StringIO()
          writer = csv.DictWriter(
              output,
              fieldnames=headers,
              quoting=csv.QUOTE_ALL,
              lineterminator='\n',
          )
          writer.writeheader()
          writer.writerows(rows)
          csv_path.write_text(output.getvalue(), encoding='utf-8')

          with csv_path.open(encoding='utf-8-sig', newline='') as handle:
              check_rows = list(csv.DictReader(handle))
          if len(check_rows) != 238:
              raise SystemExit('CSV feilet kontroll etter lagring')
          if len({row['post_name'] for row in check_rows}) != 238:
              raise SystemExit('Etterkontroll fant dupliserte slugs')
          check_map = {row['post_name']: row for row in check_rows}
          for slug in expected_slugs:
              if check_map[slug]['importstatus'] != expected_importstatus:
                  raise SystemExit(f'Etterkontroll feilet for {slug}')
          if sum(
              row['importstatus'].startswith('Fullstendig kvalitetssikret')
              for row in check_rows
          ) != 238:
              raise SystemExit('Etterkontroll bekreftet ikke 238 fullstendige arter')

          status = status_path.read_text(encoding='utf-8')
          if 'Fullstendig kvalitetssikret: **231**' not in status:
              raise SystemExit('Statusfilen har uventet antall ferdige arter fĂ¸r batch 17')
          if 'GjenstĂĄr: **7**' not in status:
              raise SystemExit('Statusfilen har uventet antall gjenstĂĄende arter fĂ¸r batch 17')

          status = status.replace(
              'Fullstendig kvalitetssikret: **231**',
              'Fullstendig kvalitetssikret: **238**',
              1,
          )
          status = status.replace('GjenstĂĄr: **7**', 'GjenstĂĄr: **0**', 1)

          batch_lines = [
              '### Batch 17 â€“ sluttbatch med de siste sju artene',
              '',
              '- Gresshoppesanger (`gresshoppesanger`)',
              '- Svartstrupe (`svartstrupe`)',
              '- Topplerke (`topplerke`)',
              '- Toppskarv (`toppskarv`)',
              '- Tornirisk (`tornirisk`)',
              '- Ă†rfugl (`aerfugl`)',
              '- Ă…kerrikse (`aakerrikse`)',
              '',
              '',
          ]
          batch_section = '\n'.join(batch_lines)
          marker = '## GjenstĂĄr\n'
          if batch_section not in status:
              if marker not in status:
                  raise SystemExit('Fant ikke innsettingspunkt i statusfilen')
              status = status.replace(marker, batch_section + marker, 1)

          status = status.replace(
              'Alle arter som ikke er oppfĂ¸rt over.',
              'Ingen. Alle 238 arter er fullstendig kvalitetssikret.',
              1,
          )

          if 'Fullstendig kvalitetssikret: **238**' not in status:
              raise SystemExit('Statusfilen fikk feil antall ferdige arter')
          if 'GjenstĂĄr: **0**' not in status:
              raise SystemExit('Statusfilen fikk feil antall gjenstĂĄende arter')
          if 'Ingen. Alle 238 arter er fullstendig kvalitetssikret.' not in status:
              raise SystemExit('Statusfilen mangler endelig sluttmelding')
          status_path.write_text(status, encoding='utf-8')

          for path in [
              Path('.github/workflows/naturblikk-kvalitetsbatch-17.yml'),
              *payload_paths,
          ]:
              if path.exists():
                  path.unlink()
          PY

      - name: Lagre fullfĂ¸rt kvalitetskontroll
        run: |
          git config user.name 'Naturblikk kvalitetskontroll'
          git config user.email 'post@naturblikk.no'
          git add -A
          git diff --cached --quiet && {
            echo 'Ingen endringer ĂĄ lagre'
            exit 1
          }
          git commit -m 'FullfĂ¸r kvalitetskontrollen: batch 17 med de siste 7 artene'
          git push origin main
