name: Naturblikk kvalitetsbatch 02

on:
  push:
    paths:
      - '.github/workflows/naturblikk-kvalitetsbatch-02.yml'

permissions:
  contents: write

jobs:
  oppdater-artsfil:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Oppdater og valider batch 2
        env:
          PAYLOAD_B64: ''
          STATUS_B64: ''
        run: |
          python - <<'PY'
          import base64, csv, io, json, os, zlib
          from pathlib import Path

          csv_path = Path('arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv')
          workflow_path = Path('.github/workflows/naturblikk-kvalitetsbatch-02.yml')

          with csv_path.open(encoding='utf-8-sig', newline='') as handle:
              reader = csv.DictReader(handle)
              headers = reader.fieldnames
              rows = list(reader)

          payload = json.loads(zlib.decompress(base64.b64decode(os.environ['PAYLOAD_B64'])).decode('utf-8'))
          wanted = {row['post_name']: row for row in payload}

          if len(rows) != 238 or len(headers or []) != 24:
              raise SystemExit(f'Uventet CSV-struktur før oppdatering: {len(rows)} rader og {len(headers or [])} kolonner')

          counts = {slug: 0 for slug in wanted}
          updated_rows = []
          for row in rows:
              slug = row.get('post_name', '')
              if slug in wanted:
                  counts[slug] += 1
                  replacement = wanted[slug]
                  if set(replacement) != set(headers):
                      raise SystemExit(f'Feil kolonner i oppdateringsrad for {slug}')
                  row = replacement
              updated_rows.append(row)

          invalid = {slug: count for slug, count in counts.items() if count != 1}
          if invalid:
              raise SystemExit(f'Forventet nøyaktig én rad per art: {invalid}')

          output = io.StringIO()
          writer = csv.DictWriter(output, fieldnames=headers, quoting=csv.QUOTE_ALL, lineterminator='\n')
          writer.writeheader()
          writer.writerows(updated_rows)
          csv_path.write_text(output.getvalue(), encoding='utf-8')

          with csv_path.open(encoding='utf-8', newline='') as handle:
              checked = list(csv.DictReader(handle))

          if len(checked) != 238:
              raise SystemExit(f'Validering feilet: {len(checked)} arter')
          if len({row['post_name'] for row in checked}) != 238:
              raise SystemExit('Validering feilet: dupliserte slugs')
          if any(len(row) != 24 for row in checked):
              raise SystemExit('Validering feilet: feil antall kolonner')
          if sum(row.get('importstatus', '').startswith('Fullstendig kvalitetssikret') for row in checked) < 21:
              raise SystemExit('Validering feilet: færre enn 21 kvalitetssikrede arter')
          for row in checked:
              if row['post_name'] in wanted:
                  text = row.get('lang_beskrivelse', '')
                  if 'art i artsgruppen' in text or 'Opplysningene bør leses' in text:
                      raise SystemExit(f'Generisk fylltekst funnet i {row["post_name"]}')

          status_text = base64.b64decode(os.environ['STATUS_B64']).decode('utf-8')
          status_candidates = []
          for path in Path('.').rglob('*.md'):
              try:
                  if '# Naturblikk – status for kvalitetskontroll' in path.read_text(encoding='utf-8'):
                      status_candidates.append(path)
              except UnicodeDecodeError:
                  pass

          if len(status_candidates) > 1:
              raise SystemExit(f'Fant flere statusfiler: {status_candidates}')
          status_path = status_candidates[0] if status_candidates else Path('arter/kvalitetskontroll_status.md')
          status_path.parent.mkdir(parents=True, exist_ok=True)
          status_path.write_text(status_text, encoding='utf-8')

          if workflow_path.exists():
              workflow_path.unlink()
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Kvalitetssikre batch 2: 10 finker, hage- og skogarter'
          git push
