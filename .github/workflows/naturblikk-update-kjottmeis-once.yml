name: Naturblikk oppdater Kjøttmeis

on:
  push:
    paths:
      - '.github/workflows/naturblikk-update-kjottmeis-once.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Oppdater CSV
        env:
          ROW_B64: ''
        run: |
          python - <<'PY'
          import base64, csv, io, os
          from pathlib import Path

          path = Path('arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv')
          text = path.read_text(encoding='utf-8')
          reader = csv.DictReader(io.StringIO(text))
          headers = reader.fieldnames
          rows = list(reader)

          row_text = base64.b64decode(os.environ['ROW_B64']).decode('utf-8')
          new_row = next(csv.DictReader(io.StringIO(','.join(f'"{h}"' for h in headers) + '\n' + row_text)))

          matches = [i for i, row in enumerate(rows) if row.get('post_name') == 'kjottmeis']
          if len(matches) != 1:
              raise SystemExit(f'Forventet én Kjøttmeis-rad, fant {len(matches)}')

          rows[matches[0]] = new_row

          out = io.StringIO()
          writer = csv.DictWriter(out, fieldnames=headers, quoting=csv.QUOTE_ALL, lineterminator='\n')
          writer.writeheader()
          writer.writerows(rows)

          check = list(csv.DictReader(io.StringIO(out.getvalue())))
          if len(check) != 238:
              raise SystemExit(f'Forventet 238 arter, fant {len(check)}')
          if any(len(row) != 24 for row in check):
              raise SystemExit('Fant rad med feil antall kolonner')

          path.write_text(out.getvalue(), encoding='utf-8')
          PY

      - name: Commit endringen og fjern engangsjobben
        run: |
          rm .github/workflows/naturblikk-update-kjottmeis-once.yml
          git config user.name "Naturblikk Bot"
          git config user.email "actions@users.noreply.github.com"
          git add arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv .github/workflows/naturblikk-update-kjottmeis-once.yml
          git commit -m "Kvalitetssikre Kjøttmeis i artsfil v4"
          git push origin HEAD:main
