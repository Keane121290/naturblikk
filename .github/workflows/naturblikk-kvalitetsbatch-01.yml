name: Naturblikk kvalitetsbatch 01

on:
  push:
    paths:
      - '.github/workflows/naturblikk-kvalitetsbatch-01.yml'

permissions:
  contents: write

jobs:
  oppdater-artsfil:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Oppdater og valider batch 1
        env:
          PAYLOAD_B64: ''
        run: |
          python - <<'PY'
          import base64
          import csv
          import io
          import json
          import os
          import zlib
          from pathlib import Path

          csv_path = Path('arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv')
          status_path = Path('arter/kvalitetskontroll-status.md')
          workflow_path = Path('.github/workflows/naturblikk-kvalitetsbatch-01.yml')

          payload = json.loads(
              zlib.decompress(base64.b64decode(os.environ['PAYLOAD_B64'])).decode('utf-8')
          )
          updates = payload['updates']

          with csv_path.open(encoding='utf-8-sig', newline='') as handle:
              reader = csv.DictReader(handle)
              headers = reader.fieldnames
              rows = list(reader)

          expected_headers = [
              'post_title', 'post_name', 'post_status', 'artsgruppe',
              'vitenskapelig_navn', 'engelsk_navn', 'kort_beskrivelse',
              'lang_beskrivelse', 'storrelse', 'vekt', 'kjennetegn',
              'levested', 'utbredelse', 'sesong_aktiv_periode', 'mat_naering',
              'rodlistestatus', 'status_i_norge', 'artsdatabanken_takson_id',
              'kilde_artsdatabanken', 'kilde_snl',
              'kilde_fuglevennen_miljolaere', 'kilde_birdlife_fugleatlas',
              'sist_kontrollert', 'importstatus',
          ]

          if headers != expected_headers:
              raise SystemExit('CSV-headeren er endret eller har feil rekkefølge.')

          if len(rows) != 238:
              raise SystemExit(f'Forventet 238 arter, fant {len(rows)}.')

          slugs = [row['post_name'] for row in rows]
          if len(set(slugs)) != 238:
              raise SystemExit('CSV-filen inneholder dupliserte slugs.')

          index = {row['post_name']: row for row in rows}
          missing = sorted(set(updates) - set(index))
          if missing:
              raise SystemExit('Mangler arter i CSV: ' + ', '.join(missing))

          for slug, values in updates.items():
              unknown = sorted(set(values) - set(headers))
              if unknown:
                  raise SystemExit(f'Ukjente felt for {slug}: {unknown}')
              index[slug].update(values)

          output = io.StringIO()
          writer = csv.DictWriter(
              output,
              fieldnames=headers,
              quoting=csv.QUOTE_ALL,
              lineterminator='\n',
          )
          writer.writeheader()
          writer.writerows(rows)
          csv_path.write_text(output.getvalue(), encoding='utf-8')

          with csv_path.open(encoding='utf-8', newline='') as handle:
              checked = list(csv.DictReader(handle))

          if len(checked) != 238:
              raise SystemExit('Validering etter skriving fant feil antall arter.')

          completed = [
              row for row in checked
              if row.get('importstatus', '').startswith('Fullstendig kvalitetssikret')
          ]

          completed_slugs = {row['post_name'] for row in completed}
          expected_completed = {'kjottmeis'} | set(updates)
          if completed_slugs != expected_completed:
              raise SystemExit(
                  'Uventet sett med fullstendig kvalitetssikrede arter: '
                  + ', '.join(sorted(completed_slugs))
              )

          batch_lines = [
              f"- {name} (`{slug}`)"
              for name, slug in payload['batch_species']
          ]
          tracker_lines = [
              '# Naturblikk – status for kvalitetskontroll',
              '',
              f'Sist oppdatert: **{payload["date"]}**',
              '',
              '- Totalt antall arter: **238**',
              f'- Fullstendig kvalitetssikret: **{len(completed)}**',
              f'- Gjenstår: **{238 - len(completed)}**',
              '',
              '## Ferdig kontrollert',
              '',
              '### Testart',
              '',
              '- Kjøttmeis (`kjottmeis`)',
              '',
              '### Batch 1 – hage- og fuglematerarter',
              '',
              *batch_lines,
              '',
              '## Gjenstår',
              '',
              'Alle arter som ikke er oppført over. Neste batch velges blant vanlige hage-, skog- og fuglematerarter.',
              '',
              '## Kontrollstandard',
              '',
              'En art regnes som fullstendig kvalitetssikret når navn, taksonomi, rødlistestatus, status i Norge, størrelse, vekt, kjennetegn, levested, utbredelse, sesong, næring, kilder og artsspesifikk langtekst er kontrollert. Feltet `importstatus` starter da med `Fullstendig kvalitetssikret`.',
              '',
          ]
          status_path.write_text('\n'.join(tracker_lines), encoding='utf-8')

          workflow_path.unlink()
          PY

      - name: Lagre oppdateringen
        run: |
          git config user.name "Naturblikk kvalitetskontroll"
          git config user.email "actions@users.noreply.github.com"
          git add arter/naturblikk_arter_oppdatert_alle_238_v4_med_engelsk_navn.csv
          git add arter/kvalitetskontroll-status.md
          git add .github/workflows/naturblikk-kvalitetsbatch-01.yml
          git diff --cached --check
          git commit -m "Kvalitetssikre batch 1: 10 hage- og fuglematerarter"
          git push origin main
